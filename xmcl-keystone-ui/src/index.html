<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Launcher</title>
    <link rel="stylesheet" href="./assets/google.font.css">
    <link rel="stylesheet" href="./assets/preload.css">
    <script src="http://launcher/flights"></script>
    <style>
        .unloaded {
            background: radial-gradient(120% 120% at 50% 20%, #1c2030 0%, #121218 55%, #0b0b0f 100%);
            height: 100vh;
            width: 100vw;
            min-width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .cl-splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            padding: 40px 56px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 60px -12px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            animation: cl-rise 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cl-logo-ring {
            position: relative;
            width: 96px;
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cl-logo-ring::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 26px;
            background: conic-gradient(from 0deg, #6c8cff, #7f5bff, #ff6fa8, #6c8cff);
            filter: blur(14px);
            opacity: 0.55;
            animation: cl-spin 3.2s linear infinite;
        }

        .cl-logo-ring img {
            position: relative;
            width: 96px;
            height: 96px;
            border-radius: 22px;
            box-shadow: 0 10px 30px -6px rgba(0, 0, 0, 0.6);
            animation: cl-pulse 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .cl-brand {
            text-align: center;
        }

        .cl-brand .cl-name {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.3px;
            background: linear-gradient(90deg, #ffffff, #cfd6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .cl-brand .cl-sub {
            margin-top: 6px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        .cl-dots {
            display: flex;
            gap: 6px;
        }

        .cl-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.55);
            animation: cl-dot 1.2s ease-in-out infinite;
        }

        .cl-dots span:nth-child(2) { animation-delay: 0.15s; }
        .cl-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes cl-spin {
            to { transform: rotate(360deg); }
        }

        @keyframes cl-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        @keyframes cl-rise {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes cl-dot {
            0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-3px); }
        }
    </style>
</head>

<body class="overflow-hidden unloaded">
    <div id="app">
        <div class="cl-splash">
            <div class="cl-logo-ring">
                <img src="./assets/logo.webp" alt="Command Launcher">
            </div>
            <div class="cl-brand">
                <div class="cl-name">Command Launcher</div>
                <div class="cl-sub">by Firepdx</div>
            </div>
            <div class="cl-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>
    <script type="module" src="./windows/main/index.ts"></script>
</body>

</html>
