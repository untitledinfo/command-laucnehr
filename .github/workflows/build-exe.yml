name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # jpackage needs the WiX Toolset (v3) to produce a .exe installer on Windows.
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          if (Test-Path $wixPath) {
            echo $wixPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Compile sources
        shell: bash
        run: |
          mkdir -p build
          find src -name "*.java" > sources.txt
          javac -d build @sources.txt
          rm sources.txt

      - name: Build runnable jar
        shell: bash
        run: |
          cd build
          jar --create --file ../CommandLauncher.jar --main-class launcher.LauncherApp .
          cd ..

      - name: Package with jpackage (.exe installer)
        shell: bash
        run: |
          mkdir -p dist
          jpackage \
            --type exe \
            --input . \
            --main-jar CommandLauncher.jar \
            --main-class launcher.LauncherApp \
            --name "CommandLauncher" \
            --app-version "1.0.0" \
            --vendor "Firepdx" \
            --description "Command Launcher - a Minecraft launcher" \
            --dest dist \
            --win-dir-chooser \
            --win-shortcut \
            --win-menu

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: CommandLauncher-windows-exe
          path: dist/*.exe
          if-no-files-found: error

      # Attaches the .exe to a GitHub Release automatically when you push a tag like v1.0.0
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
