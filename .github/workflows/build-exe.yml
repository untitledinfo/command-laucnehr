name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main process
        run: npm run build

      - name: Package with electron-builder (.exe installer)
        run: npx electron-builder --win --publish never

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: CommandLauncher-windows-exe
          path: release/*.exe
          if-no-files-found: error

      # Attaches the .exe to a GitHub Release automatically when you push a tag like v1.0.0
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
