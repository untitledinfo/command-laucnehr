name: Build All Platforms

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            build_cmd: npx electron-builder --win --x64 --publish never
            artifact_glob: release/*x64*.exe

          - name: windows-ia32
            os: windows-latest
            build_cmd: npx electron-builder --win --ia32 --publish never
            artifact_glob: release/*ia32*.exe

          - name: macos
            os: macos-latest
            build_cmd: npx electron-builder --mac --x64 --arm64 --publish never
            artifact_glob: release/*.dmg

          - name: linux-x64
            os: ubuntu-latest
            build_cmd: npx electron-builder --linux --x64 --publish never
            artifact_glob: release/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main process
        run: npm run build

      - name: Package (${{ matrix.name }})
        run: ${{ matrix.build_cmd }}
        env:
          # No code-signing certificates in CI - build unsigned artifacts
          # instead of failing when electron-builder can't find one.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CommandLauncher-${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      # Attaches every platform's build to a GitHub Release automatically
      # when you push a tag like v1.0.0
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
