name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Show project files
        run: |
          pwd
          ls -la

      - name: Verify package.json
        run: |
          if [ ! -f package.json ]; then
            echo "::error::package.json not found in repository root."
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Type Check
        run: npm run type-check --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ -d ".next" ]; then
            echo "Next.js build found."
            ls -la .next
          elif [ -d "dist" ]; then
            echo "Dist build found."
            ls -la dist
          elif [ -d "build" ]; then
            echo "Build directory found."
            ls -la build
          else
            echo "::error::No build output found (.next, dist, or build)."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next
            dist
            build
          if-no-files-found: ignore
