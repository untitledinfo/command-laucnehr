name: Build Launcher

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: exe
          - os: ubuntu-latest
            artifact: AppImage
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder --publish=never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: command-launcher-${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.AppImage
          if-no-files-found: ignore
