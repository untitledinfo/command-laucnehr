name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Type Check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Dist
        run: npm run dist

      - name: Verify Build Output
        run: |
          ls -la
          ls -la .next

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          include-hidden-files: true
